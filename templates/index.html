<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Emotion & Activity Monitor</title>
    <!-- Chart.js for graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --accent: #10b981;
            --danger: #ef4444;
            --text: #f8fafc;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-color);
            background-image: radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 20%),
                              radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.15) 0%, transparent 20%);
            color: var(--text);
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            padding: 1rem;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        h1 {
            margin: 0;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            padding: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .video-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .video-feed {
            width: 100%;
            border-radius: 12px;
            border: 2px solid var(--glass-border);
            object-fit: cover;
            background-color: #000;
        }

        .controls {
            margin-top: 15px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .btn-danger {
            background: var(--danger);
        }

        .btn-danger:hover {
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            margin-top: 5px;
            color: var(--accent);
        }

        .stat-label {
            font-size: 14px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stress-bar-container {
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            overflow: hidden;
            margin-top: 10px;
        }

        .stress-bar {
            height: 100%;
            background: linear-gradient(to right, #10b981, #f59e0b, #ef4444);
            width: 0%;
            transition: width 0.3s ease;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
        }

        .activity-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 25px;
        }

        .activity-table th, .activity-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .activity-table th {
            color: #94a3b8;
            font-weight: 500;
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            background: transparent;
        }
        
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        
        input[type="color"]::-webkit-color-swatch {
            border: 2px solid var(--glass-border);
            border-radius: 50%;
        }

        .patient-alert {
            display: none;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid var(--danger);
            color: #fca5a5;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 20px;
            animation: pulse 2s infinite;
            margin-bottom: 20px;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

    </style>
</head>
<body>

    <header>
        <h1>AI Emotion & Activity Monitor</h1>
        <p style="margin: 5px 0 0 0; color: #94a3b8;">Real-time mental wellness tracking interface</p>
    </header>

    <div class="container">
        <!-- Main Video Area -->
        <main class="glass-panel video-container">
            <div id="patientAlert" class="patient-alert">
                ⚠️ PATIENT MOVING - ATTENTION REQUIRED ⚠️
            </div>
            <div class="video-container">
                <img id="camStream" src="" class="video-feed" alt="Evaluating Camera...">
                <button class="mode-btn" onclick="toggleMode()">Switch to Patient Mode</button>
            </div>
        </main>

        <!-- Sidebar Analytics Area -->
        <aside class="glass-panel">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Current Emotion</div>
                    <div class="stat-value" id="emotionVal" style="color: #60a5fa;">Neutral</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Current Activity</div>
                    <div class="stat-value" id="activityVal">Idle</div>
                </div>
            </div>

            <div class="stat-card" style="margin-bottom: 25px;">
                <div class="stat-label" style="display: flex; justify-content: space-between;">
                    <span>Stress Level</span>
                    <span id="stressValueText">0%</span>
                </div>
                <div class="stress-bar-container">
                    <div class="stress-bar" id="stressBar"></div>
                </div>
            </div>

            <div class="section-title">Stress History (60s)</div>
            <div style="height: 180px; margin-bottom: 25px;">
                <canvas id="stressChart"></canvas>
            </div>

            <div class="section-title">Activity Durations</div>
            <table class="activity-table" id="activityTable">
                <thead>
                    <tr>
                        <th>Activity</th>
                        <th>Time Spent</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Populated via JS -->
                </tbody>
            </table>

            <div class="section-title">Arduino Override</div>
            <div class="color-picker-container">
                <input type="color" id="rgbPicker" value="#00ff00">
                <button onclick="sendColor()">Set Custom RGB Color</button>
                <button onclick="autoColor()" style="background: var(--accent);">Auto AI Color</button>
            </div>
        </aside>
    </div>

    <script>
        let patientMode = false;
        
        // Fetch Video Frames manually over base64 to ensure no stream drops
        setInterval(async () => {
            try {
                const res = await fetch('/api/frame');
                const data = await res.json();
                if (data.frame) {
                    document.getElementById('camStream').src = "data:image/jpeg;base64," + data.frame;
                }
            } catch (e) {
                console.log("Waiting for backend...");
            }
        }, 150);

        // Setup Chart.js
        const ctx = document.getElementById('stressChart').getContext('2d');
        const stressChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Stress Score',
                    data: [],
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100,
                        grid: { color: 'rgba(255, 255, 255, 0.1)' },
                        ticks: { color: '#94a3b8' }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { color: '#94a3b8', maxTicksLimit: 6 }
                    }
                }
            }
        });

        // Format seconds to Mm Ss
        function formatTime(seconds) {
            if (seconds === 0) return "0s";
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return m > 0 ? `${m}m ${s}s` : `${s}s`;
        }

        // Fetch stats periodically
        async function fetchStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                
                // Update basic stats
                document.getElementById('emotionVal').innerText = data.emotion.charAt(0).toUpperCase() + data.emotion.slice(1);
                document.getElementById('activityVal').innerText = data.activity.charAt(0).toUpperCase() + data.activity.slice(1);
                
                // Update stress bar
                const sVal = data.stress;
                document.getElementById('stressValueText').innerText = `${sVal}%`;
                document.getElementById('stressBar').style.width = `${sVal}%`;

                // Update activity table
                const tbody = document.querySelector('#activityTable tbody');
                tbody.innerHTML = '';
                const durs = data.activity_durations;
                
                Object.keys(durs).sort((a,b) => durs[b] - durs[a]).forEach(k => {
                    if (durs[k] > 0) {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td style="text-transform: capitalize;">${k}</td>
                            <td>${formatTime(durs[k])}</td>
                        `;
                        tbody.appendChild(tr);
                    }
                });

                // Update Chart
                const hist = data.stress_history;
                stressChart.data.labels = hist.map(h => h.time);
                stressChart.data.datasets[0].data = hist.map(h => h.stress);
                stressChart.update();

                // Handle Patient Mode Alerts
                const alertEl = document.getElementById('patientAlert');
                if (data.patient_mode && data.patient_moving) {
                    alertEl.style.display = 'block';
                } else {
                    alertEl.style.display = 'none';
                }

            } catch (err) {
                console.error("Error fetching stats:", err);
            }
        }

        setInterval(fetchStats, 1000);

        // Toggle Mode
        async function toggleMode() {
            patientMode = !patientMode;
            const btn = document.getElementById('modeBtn');
            btn.innerText = patientMode ? "Switch to Normal Mode" : "Switch to Patient Mode";
            if (patientMode) {
                btn.classList.add('btn-danger');
            } else {
                btn.classList.remove('btn-danger');
            }

            await fetch('/api/mode', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ patient_mode: patientMode })
            });
        }

        // Send RGB
        async function sendColor() {
            const hex = document.getElementById('rgbPicker').value;
            // Convert hex to rgb
            const r = parseInt(hex.substr(1,2), 16);
            const g = parseInt(hex.substr(3,2), 16);
            const b = parseInt(hex.substr(5,2), 16);

            await fetch('/api/rgb', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ r, g, b })
            });
            alert(`Sent Custom Color: R:${r} G:${g} B:${b} to Arduino`);
        }

        async function autoColor() {
            await fetch('/api/rgb', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ auto: true })
            });
            alert("Restored Auto AI LED Colors!");
        }
    </script>
</body>
</html>
